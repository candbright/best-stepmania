<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestStepMania</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #08080f;
        color: #e8e8f0;
        font-family: system-ui, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        text-align: center;
        padding: 1.25rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        margin: 0 auto;
        border: 3px solid rgba(232, 232, 240, 0.2);
        border-top-color: #8b8bdc;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>BestStepMania</h1>
      <div class="spinner" aria-hidden="true"></div>
      <p class="hint">Loading…</p>
    </div>
  </body>
</html>
