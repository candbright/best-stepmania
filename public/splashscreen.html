<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestStepMania</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(120% 100% at 18% 12%, rgba(124, 58, 237, 0.28) 0%, transparent 48%),
          radial-gradient(120% 100% at 82% 18%, rgba(244, 63, 94, 0.2) 0%, transparent 55%),
          linear-gradient(145deg, #171733 0%, #0b0b1a 50%, #05050f 100%);
        color: #e8e8f0;
        font-family: system-ui, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06) 0px,
          rgba(255, 255, 255, 0.06) 1px,
          transparent 2px,
          transparent 5px
        );
        opacity: 0.2;
      }
      .wrap {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 0.5rem 0.75rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        margin: 0 auto;
        border: 3px solid rgba(232, 232, 240, 0.2);
        border-top-color: #a78bfa;
        box-shadow: 0 0 18px rgba(167, 139, 250, 0.45);
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        opacity: 0.65;
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 2.2s;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>BestStepMania</h1>
      <div class="spinner" aria-hidden="true"></div>
      <p class="hint">Loading…</p>
    </div>
  </body>
</html>
